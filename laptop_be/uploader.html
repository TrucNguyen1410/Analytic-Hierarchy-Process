<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Data Uploader</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 400px; }
        h2 { color: #1a73e8; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="file"], input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #1557b0; }
        #status { margin-top: 15px; padding: 10px; border-radius: 6px; display: none; }
        .success { background: #e6f4ea; color: #1e8e3e; display: block !important; }
        .error { background: #fce8e6; color: #d93025; display: block !important; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚀 Laptop Data Uploader</h2>
        <div class="form-group">
            <label>Token Admin (Lấy từ Backend):</label>
            <input type="text" id="token" placeholder="Dán token vào đây..." value="eyJ1c2VyX2lkIjoyLCJlbWFpbCI6ImFkbWluQGdtYWlsLmNvbSIsInJvbGUiOiJhZG1pbiJ9.aexJpg.WGEzwuzjHQDhizH0Z4iNuPdgyug">
        </div>
        <div class="form-group">
            <label>Chọn file Excel:</label>
            <input type="file" id="fileInput" accept=".xlsx, .xls">
        </div>
        <button onclick="uploadData()">Nạp dữ liệu ngay</button>
        <div id="status"></div>
    </div>

    <script>
        async function uploadData() {
            const fileInput = document.getElementById('fileInput');
            const token = document.getElementById('token').value;
            const status = document.getElementById('status');
            
            if (!fileInput.files[0]) {
                alert('Vui lòng chọn file!');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('sheetName', 'Laptop_Data');
            formData.append('replaceStaging', 'true');
            formData.append('autoCommit', 'true');

            status.className = '';
            status.innerText = 'Đang tải lên...';
            status.style.display = 'block';

            try {
                const response = await fetch('http://127.0.0.1:5000/api/admin/imports/laptop-data', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                const result = await response.json();
                if (response.ok) {
                    status.className = 'success';
                    status.innerText = '✅ Thành công! Đã nạp ' + (result.commitResult?.after?.laptops || 0) + ' máy.';
                } else {
                    status.className = 'error';
                    status.innerText = '❌ Lỗi: ' + (result.message || 'Không xác định');
                }
            } catch (err) {
                status.className = 'error';
                status.innerText = '❌ Lỗi kết nối: ' + err.message;
            }
        }
    </script>
</body>
</html>
